version: "3.9"

services:
  # NOTE: Postgres credentials here MUST match DATABASE_URL in apps/server/.env
  # For development only — change in production
  postgres:
    image: postgres:16-alpine
    container_name: hanzi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hanzi
      POSTGRES_PASSWORD: hanzi_dev
      POSTGRES_DB: hanzi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hanzi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hanzi-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    container_name: hanzi-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - apps/server/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: hanzi-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
