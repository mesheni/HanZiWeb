version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hanzi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hanzi
      POSTGRES_PASSWORD: hanzi_dev
      POSTGRES_DB: hanzi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hanzi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hanzi-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
